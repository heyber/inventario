version: "3.9"

services:
  db:
    image: postgres:15
    container_name: inventarios-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventarios_db
    ports:
      - "5433:5432"
    volumes:
      - inventarios_data:/var/lib/postgresql/data

  app:
    image: inventarios-app
    container_name: inventarios-app
    build: .
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/inventarios_db"
    depends_on:
      - db

volumes:
  inventarios_data: